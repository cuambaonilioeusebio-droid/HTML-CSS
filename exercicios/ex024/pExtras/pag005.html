<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script</title>
</head>
<body>
    <div>
        <button onclick="clicou()">Clique</button>
    </div>
    <div id="mais">

    </div>

    <script>
        function clicou(){
            v=window.document.getElementById("mais");
            v.innerHTML+='<p>Clicou</p>';
        }
    </script>
</body>
</html>
