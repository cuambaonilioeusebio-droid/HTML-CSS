<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empacotamento e fluxo no flexbox</title>
    <style>
        main{
            height: 200px;
            display: flex;
            background-color: black;
            padding: 2px;
            /*flex-direction: column;
            flex-wrap: wrap-reverse;*/
            flex-flow: column wrap-reverse;
        }
        .item{
            padding: 1px 3px;
            margin: 2px 4px;
            background-color: white;
        }
    </style>
</head>
<body>
    <main>
        <div class="item">Exemplo caixa A</div>
        <div class="item">Exemplo caixa B</div>
        <div class="item">Exemplo caixa C</div>
        <div class="item">Exemplo caixa D</div>
        <div class="item">Exemplo caixa E</div>
        <div class="item">Exemplo caixa F</div>
        <div class="item">Exemplo caixa G</div>
        <div class="item">Exemplo caixa H</div>
        <div class="item">Exemplo caixa I</div>
    </main>
</body>
</html>
