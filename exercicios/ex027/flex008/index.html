<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propriedade order e align-self</title>
    <style>
        main{
            height: 300px;
            display: flex;
            background-color: black;
            padding: 2px;
            flex-flow: row nowrap;
            justify-content: flex-end;
        }
        .item{
            padding: 1px 3px;
            margin: 2px 4px;
            background-color: white;
            height: 30px;
        }
        #item1{
            align-self: auto;
        }
        #item2{
            align-self: stretch;
        }
        #item3{
            align-self: flex-start;
        }
        #item4{
            align-self: flex-end;
        }
    </style>
</head>
<body>
    <main>
        <div id="item1" class="item">Exemplo A</div>
        <div id="item2" class="item">Exemplo B</div>
        <div id="item3" class="item">Exemplo C</div>
        <div id="item4" class="item">Exemplo D</div>
    </main>
</body>
</html>
