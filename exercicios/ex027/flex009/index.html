<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propriedade order e align-self</title>
    <style>
        main{
           display: flex;
            background-color: black;
            padding: 2px;
            flex-flow: row wrap;
            justify-content: flex-end;
        }
        .item{
            padding: 1px 3px;
            margin: 2px 4px;
            background-color: white;
            flex-basis: auto;
        }
    </style>
</head>
<body>
    <main>
        <div id="item1" class="item">alguma coisa A</div>
        <div id="item2" class="item">Exemplo B</div>
        <div id="item3" class="item">Exemplo C</div>
        <div id="item4" class="item">alguma coisa D</div>
    </main>
</body>
</html>
