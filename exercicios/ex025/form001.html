<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro formulário</title>
</head>
<body>
    <!--
        1.Tag form e seus paramentros;
            *action:nome do arquivo php;
            *method:Post,get.cookie e etc;
            *autocomplete:on ou off.
        2.Tag label e seus parametros:
            *for:nome do id do respectivo camp.
        3.Tag input do type text com seus paramentros;
            *type:text;
            *id;
            *name;
            *required;
            *minlength:numeros inteiros;
            *maxlength:numeros inteiros;
            *size:numeros inteiros;
            *placeholder:sugestao do que prencher no campo;
            *autocomplete
            *value:valor de iniciação 
        4.Tag input do type submit com os seus parametros;
            *type:submit;
            *value:Valor/legenda do butao;
        5.Tag input do type reset com os seus parametros;    
            *type:reset;
            *value:Valor/legenda do butao;
        6.Tag input do type number:
            *type:number;
            *id;
            *name;
            *required;   
            *min:numero inteiro;  
            *max:numero inteiro;     
            *step:numero inteiro;
            *value:valor de iniciação 
        7.Tag input do type month:
            *type:month;
            *id;
            *name;
            *required;  
            *min:numero inteiro;  
            *max:numero inteiro;  
            *step:numero inteiro;
            *value:valor de iniciação  
        8.Tag input do type date:
            *type:date;
            *id;
            *name;
            *required;  
            *min:numero inteiro;  
            *max:numero inteiro;  
            *step:numero inteiro;
            *value:valor de iniciação 
        9.Tag input do type time:
            *type:date;
            *id;
            *name;
            *required;  
            *min:numero inteiro;  
            *max:numero inteiro;  
            *step:numero inteiro;
            *value:valor de iniciação 
    -->
    <h1>Meu primeiro formulário</h1>
    <form action="cadstro.php" method="GET">
        <p><label for="inome">Nome</label> <input type="text" name="nome" id="inome"></p>
        <p><label for="isobrenome">Sobrenome</label> <input type="text" name="sobrenome" id="isobrenome"></p>
        <p><input type="submit" value="Enviar"></p>
    </form>
</body>
</html>
