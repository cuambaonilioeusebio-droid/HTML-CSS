<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos color,range e file</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="">
        <div>
            <label for="icor">Cor</label>
            <input type="color" name="cor" id="icor" required value="#ffffff">
        </div>
        <div>
            <label for="irange">Nivel de satisfação</label>
            <input type="range" name="range" id="irange" required value="20">
        </div>
        <div>
            <label for="ifoto">Foto de perfil</label>
            <input type="file" name="foto" id="ifoto" required>
        </div>
        <div>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </div>
    </form>
</body>
</html>
