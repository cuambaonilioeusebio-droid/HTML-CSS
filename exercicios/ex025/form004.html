<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios com telefone e email</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="">
        <fieldset>
            <legend>Dados pessoais</legend>
            <div>
                <label for="inome">Nome</label>
                <input type="text" name="nome" id="inome">
            </div>
            <div>
                <label for="iemail">Email</label>
                <input type="email" name="email" id="iemail" minlength=7 size="10" placeholder="email">
            </div>
            <div>
                <label for="itel">Telefone</label>
                <input type="tel" name="tel" id="itel" minlength=7 size="20" placeholder="tel">
            </div>
        </fieldset>
        <div>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </div>
    </form>
</body>
</html>
